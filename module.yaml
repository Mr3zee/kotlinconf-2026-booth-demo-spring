product: jvm/app

layout: maven-like

dependencies:
  - org.springframework.boot:spring-boot-starter-cache
  - org.springframework.boot:spring-boot-starter-data-jpa
  - org.springframework.boot:spring-boot-starter-thymeleaf
  - org.springframework.boot:spring-boot-starter-webmvc
  - org.springframework.boot:spring-boot-starter-validation
  - com.fasterxml.jackson.core:jackson-databind
  - javax.cache:cache-api
  - org.springframework.boot:spring-boot-starter-actuator: runtime-only
  - org.webjars:webjars-locator-lite:1.1.3: runtime-only
  - org.webjars.npm:bootstrap:5.3.8: runtime-only
  - org.webjars.npm:font-awesome:4.7.0: runtime-only
  - com.github.ben-manes.caffeine:caffeine: runtime-only
  - com.h2database:h2: runtime-only
  - com.mysql:mysql-connector-j: runtime-only
  - org.postgresql:postgresql: runtime-only
  - org.springframework.boot:spring-boot-devtools: runtime-only
  - org.jetbrains.kotlin:kotlin-reflect: runtime-only

test-dependencies:
  - org.springframework.boot:spring-boot-starter-data-jpa-test
  - org.springframework.boot:spring-boot-starter-restclient-test
  - org.springframework.boot:spring-boot-starter-webmvc-test
  - org.springframework.boot:spring-boot-testcontainers
  - org.springframework.boot:spring-boot-docker-compose
  - org.testcontainers:testcontainers-junit-jupiter
  - org.testcontainers:testcontainers-mysql

settings:
  springBoot:
    enabled: true
    version: 4.0.6
  lombok: enabled
  jvm:
    release: 21
    mainClass: org.springframework.samples.petclinic.PetClinicApplication
